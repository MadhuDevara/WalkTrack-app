<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WalkTrack · Steps Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'Inter Tight', system-ui, sans-serif;
    background: #f5f1ea;
    background-image:
      radial-gradient(900px 600px at 10% 0%, #ebe3d4 0%, transparent 60%),
      radial-gradient(900px 700px at 90% 100%, #e2d8c4 0%, transparent 60%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    box-sizing: border-box;
    color: #1c2418;
  }
  #root { width: 100%; display: flex; align-items: center; justify-content: center; }
  /* Hide scrollbars but keep scrolling */
  .WalkTrack-scroll::-webkit-scrollbar { width: 0; height: 0; }
  .WalkTrack-scroll { scrollbar-width: none; }

  @keyframes pulse-ring {
    0% { transform: scale(0.96); opacity: 0.7; }
    50% { transform: scale(1.04); opacity: 0.3; }
    100% { transform: scale(0.96); opacity: 0.7; }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }
  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/theme.jsx"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/atoms.jsx"></script>
  <script type="text/babel" src="src/screens-home.jsx"></script>
  <script type="text/babel" src="src/screens-weight.jsx"></script>
  <script type="text/babel" src="src/screens-history.jsx"></script>
  <script type="text/babel" src="src/screens-walk.jsx"></script>
  <script type="text/babel" src="src/screens-achievements.jsx"></script>
  <script type="text/babel" src="src/screens-friends.jsx"></script>
  <script type="text/babel" src="src/screens-profile.jsx"></script>
  <script type="text/babel" src="src/screens-onboarding.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>

  <script>
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": [
        "#0F1B14",
        "#34D399",
        "#F5F1EA",
        "#A8D5A2"
      ],
      "stepGoal": 10000,
      "currentSteps": 7842,
      "dark": true,
      "metric": true,
      "showWeightPanel": true,
      "hasOnboarded": true
    }/*EDITMODE-END*/;
    window.__TWEAK_DEFAULTS = TWEAK_DEFAULTS;
  </script>
</body>
</html>
